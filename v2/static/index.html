<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンビニ飯ガチャ v2</title>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,.1);--border-s:rgba(0,0,0,.2);
    --text:#1a1a1a;--muted:#888;--accent:#1a1a1a;
    --seven:#007b3b;--lawson:#0052a0;--famima:#006ab7;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;min-height:100vh;}
  header{padding:1.5rem 1rem 1rem;text-align:center;}
  header h1{font-size:22px;font-weight:700;letter-spacing:-.02em;}
  .subtitle{font-size:12px;color:var(--muted);margin-top:4px;}
  .badge{display:inline-block;margin-top:8px;font-size:11px;padding:3px 10px;border-radius:20px;}
  .badge.ok{background:#e8f5ec;color:#2e7d32;}
  .badge.ng{background:#fce8e8;color:#b71c1c;}
  .container{max-width:480px;margin:0 auto;padding:0 1rem 2rem;}
  .label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
  .store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
  .store-btn{border:1.5px solid var(--border-s);border-radius:12px;padding:12px 6px 10px;cursor:pointer;background:var(--surface);text-align:center;transition:all .15s;user-select:none;}
  .store-btn:hover{background:#f0f0f0;}
  .dot{width:10px;height:10px;border-radius:50%;margin:0 auto 6px;}
  .store-btn .name{font-size:12px;font-weight:600;}
  [data-store=seven] .dot{background:var(--seven);}
  [data-store=lawson] .dot{background:var(--lawson);}
  [data-store=famima] .dot{background:var(--famima);}
  [data-store=seven].active{border-color:var(--seven);background:#e8f5ec;}
  [data-store=lawson].active{border-color:var(--lawson);background:#e6f0fb;}
  [data-store=famima].active{border-color:var(--famima);background:#e6f0fb;}
  .budget-wrap{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:1rem;margin-bottom:1rem;}
  .budget-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .budget-sym{font-size:18px;font-weight:700;color:var(--muted);}
  #budget{font-size:28px;font-weight:700;border:none;outline:none;background:transparent;width:120px;color:var(--text);}
  #budget::-webkit-inner-spin-button{display:none;}
  .budget-unit{font-size:14px;color:var(--muted);}
  .presets{display:flex;gap:6px;flex-wrap:wrap;}
  .preset-btn{border:1px solid var(--border-s);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--text);transition:all .12s;}
  .preset-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .cat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem;}
  .cat-btn{border:1px solid var(--border-s);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s;}
  .cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .gacha-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .15s,transform .1s;margin-bottom:1.25rem;}
  .gacha-btn:hover{opacity:.85;}
  .gacha-btn:active{transform:scale(.98);}
  .gacha-btn:disabled{opacity:.35;cursor:not-allowed;}
  .result-box{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
  .result-ph{padding:2.5rem 1rem;text-align:center;color:var(--muted);font-size:13px;}
  .result-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);animation:fadeUp .25s ease both;}
  .result-item:last-of-type{border-bottom:none;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .cat-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
  .cat-tag.onigiri{background:#e8f5e9;color:#2e7d32;}
  .cat-tag.bento{background:#fff3e0;color:#e65100;}
  .cat-tag.sandwich,.cat-tag.bread{background:#fce4ec;color:#c62828;}
  .cat-tag.sweets{background:#f3e5f5;color:#6a1b9a;}
  .cat-tag.salad{background:#e8f5e9;color:#1b5e20;}
  .cat-tag.souzai{background:#e3f2fd;color:#0d47a1;}
  .cat-tag.snack{background:#fff8e1;color:#f57f17;}
  .item-body{flex:1;min-width:0;}
  .item-name{font-size:13px;line-height:1.4;}
  .item-nutrition{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
  .nutr-pill{font-size:10px;padding:2px 6px;border-radius:8px;white-space:nowrap;font-weight:600;}
  .nutr-kcal{background:#fff3e0;color:#e65100;}
  .nutr-p{background:#e3f2fd;color:#0d47a1;}
  .nutr-f{background:#fce4ec;color:#c62828;}
  .nutr-c{background:#e8f5e9;color:#2e7d32;}
  .item-price{font-size:15px;font-weight:700;white-space:nowrap;flex-shrink:0;}
  .result-total{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#fafafa;border-top:1.5px solid var(--border-s);}
  .total-l{font-size:12px;color:var(--muted);}
  .total-r{font-size:20px;font-weight:700;}
  .rem{display:inline-block;margin-left:8px;font-size:11px;font-weight:600;padding:2px 10px;border-radius:10px;}
  .rem.ok{background:#e8f5e9;color:#2e7d32;}
  .rem.zero{background:#e8f5e9;color:#1b5e20;}
  .rem.over{background:#fce8e8;color:#b71c1c;}
  .nutr-summary{padding:14px 16px;background:#fafafa;border-top:0.5px solid var(--border);}
  .nutr-summary-title{font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:0.04em;}
  .nutr-kcal-total{display:flex;align-items:baseline;gap:4px;margin-bottom:10px;}
  .nutr-kcal-num{font-size:24px;font-weight:700;color:#e65100;}
  .nutr-kcal-ref{font-size:11px;color:var(--muted);}
  .nutr-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .nutr-bar-lbl{font-size:11px;width:14px;font-weight:700;}
  .nutr-bar-lbl-p{color:#1565c0;}
  .nutr-bar-lbl-f{color:#c62828;}
  .nutr-bar-lbl-c{color:#2e7d32;}
  .nutr-bar-wrap{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;position:relative;}
  .nutr-bar{height:100%;border-radius:4px;transition:width .5s ease;}
  .nutr-bar-ref-line{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,0.2);border-radius:2px;}
  .nutr-bar-p{background:#1565c0;}
  .nutr-bar-f{background:#c62828;}
  .nutr-bar-c{background:#2e7d32;}
  .nutr-bar-val{font-size:12px;font-weight:600;min-width:40px;text-align:right;color:var(--text);}
  .nutr-bar-ref{font-size:10px;color:var(--muted);min-width:44px;text-align:right;}
  .pfc-section{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);display:flex;align-items:flex-start;gap:14px;}
  .pfc-info{font-size:11px;color:var(--text);}
  .pfc-title{font-size:12px;font-weight:600;margin-bottom:6px;}
  .pfc-pct{line-height:2.2;}
  .pfc-ideal{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.6;}
  .pfc-note{font-size:10px;color:var(--muted);margin-top:6px;opacity:0.7;}
  .empty{padding:2rem;text-align:center;color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<header>
  <h1>🎰 コンビニ飯ガチャ</h1>
  <div class="subtitle">予算内でランダムに選んでくれる</div>
  <div id="data-status" class="badge ng">データ読み込み中...</div>
</header>
<div class="container">
  <div class="label">コンビニ</div>
  <div class="store-grid" id="store-grid">
    <button class="store-btn active" data-store="seven"><div class="dot"></div><div class="name">セブン</div></button>
    <button class="store-btn" data-store="lawson"><div class="dot"></div><div class="name">ローソン</div></button>
    <button class="store-btn" data-store="famima"><div class="dot"></div><div class="name">ファミマ</div></button>
  </div>
  <div class="label">予算</div>
  <div class="budget-wrap">
    <div class="budget-row">
      <span class="budget-sym">¥</span>
      <input id="budget" type="number" value="800" min="100" max="5000" step="50">
      <span class="budget-unit">円</span>
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="setBudget(500)">¥500</button>
      <button class="preset-btn" onclick="setBudget(700)">¥700</button>
      <button class="preset-btn" onclick="setBudget(800)">¥800</button>
      <button class="preset-btn" onclick="setBudget(1000)">¥1,000</button>
      <button class="preset-btn" onclick="setBudget(1500)">¥1,500</button>
    </div>
  </div>
  <div class="label">カテゴリ</div>
  <div class="cat-grid" id="cat-grid"></div>
  <button class="gacha-btn" id="gacha-btn" onclick="doGacha()" disabled>データ読み込み中...</button>
  <div class="result-box" id="result-box"><div class="result-ph">コンビニと予算を設定して「ガチャる！」</div></div>
</div>

<script>
const CAT_LABELS = {onigiri:'おにぎり',bento:'お弁当',sandwich:'サンドイッチ',bread:'パン',sweets:'スイーツ',salad:'サラダ',souzai:'惣菜',snack:'お菓子'};
const REF = {kcal:667, protein:20, fat:22, carbs:90};
let allData = null, currentStore = 'seven', activeCats = new Set();

async function loadData() {
  try {
    const res = await fetch('/v2/api/products');
    if (!res.ok) throw new Error();
    allData = await res.json();
    const d = new Date(allData.updated_at);
    const fmt = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0') + ' 更新';
    document.getElementById('data-status').textContent = fmt;
    document.getElementById('data-status').className = 'badge ok';
    renderCats();
    document.getElementById('gacha-btn').disabled = false;
    document.getElementById('gacha-btn').textContent = 'ガチャる！🎲';
  } catch(e) {
    document.getElementById('data-status').textContent = 'データなし';
    document.getElementById('data-status').className = 'badge ng';
    document.getElementById('gacha-btn').textContent = 'データがありません';
  }
}

function renderCats() {
  if (!allData) return;
  const cats = Object.keys(allData.stores[currentStore].categories);
  activeCats = new Set(cats.filter(c => !['sweets','snack'].includes(c)));
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  cats.forEach(id => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCats.has(id) ? ' active' : '');
    btn.textContent = CAT_LABELS[id] || id;
    btn.onclick = function() {
      activeCats.has(id) ? activeCats.delete(id) : activeCats.add(id);
      btn.classList.toggle('active');
    };
    grid.appendChild(btn);
  });
}

document.getElementById('store-grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.store-btn');
  if (!btn) return;
  document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStore = btn.dataset.store;
  renderCats();
  document.getElementById('result-box').innerHTML = '<div class="result-ph">コンビニと予算を設定して「ガチャる！」</div>';
});

function setBudget(v) { document.getElementById('budget').value = v; }

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function makeSvgTriangle(pPct, fPct, cPct) {
  var total = pPct + fPct + cPct || 1;
  var pR = pPct/total, fR = fPct/total, cR = cPct/total;
  var ax=100, ay=12, bx=18, by=162, cx=182, cy=162;
  var px = ax*pR + bx*fR + cx*cR;
  var py = ay*pR + by*fR + cy*cR;
  var ip=0.15, ifv=0.25, ic=0.60;
  var ix = ax*ip + bx*ifv + cx*ic;
  var iy = ay*ip + by*ifv + cy*ic;
  var svg = '<svg width="200" height="180" viewBox="0 0 200 180" style="flex-shrink:0">';
  svg += '<polygon points="' + ax + ',' + ay + ' ' + bx + ',' + by + ' ' + cx + ',' + cy + '" fill="none" stroke="#ddd" stroke-width="1.5"/>';
  svg += '<line x1="' + ax + '" y1="' + ay + '" x2="' + ((bx+cx)/2) + '" y2="' + ((by+cy)/2) + '" stroke="#f0f0f0" stroke-width="0.8"/>';
  svg += '<line x1="' + bx + '" y1="' + by + '" x2="' + ((ax+cx)/2) + '" y2="' + ((ay+cy)/2) + '" stroke="#f0f0f0" stroke-width="0.8"/>';
  svg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + ((ax+bx)/2) + '" y2="' + ((ay+by)/2) + '" stroke="#f0f0f0" stroke-width="0.8"/>';
  svg += '<circle cx="' + ix + '" cy="' + iy + '" r="10" fill="rgba(100,180,100,0.15)" stroke="rgba(100,180,100,0.5)" stroke-width="1" stroke-dasharray="3 2"/>';
  svg += '<circle cx="' + px.toFixed(1) + '" cy="' + py.toFixed(1) + '" r="7" fill="#e65100" opacity="0.9"/>';
  svg += '<text x="' + ax + '" y="' + (ay-4) + '" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">P</text>';
  svg += '<text x="' + (bx-8) + '" y="' + (by+4) + '" text-anchor="end" font-size="11" fill="#c62828" font-weight="600">F</text>';
  svg += '<text x="' + (cx+8) + '" y="' + (cy+4) + '" text-anchor="start" font-size="11" fill="#2e7d32" font-weight="600">C</text>';
  svg += '<text x="' + px.toFixed(1) + '" y="' + (py+18).toFixed(1) + '" text-anchor="middle" font-size="9" fill="#e65100">今回</text>';
  svg += '</svg>';
  return svg;
}

function doGacha() {
  if (!allData) return;
  var budget = parseInt(document.getElementById('budget').value) || 800;
  if (activeCats.size === 0) {
    document.getElementById('result-box').innerHTML = '<div class="empty">カテゴリを選んでください</div>';
    return;
  }
  var pool = [];
  activeCats.forEach(function(id) {
    var cat = allData.stores[currentStore].categories[id];
    if (cat) cat.items.forEach(function(item) {
      if (item.price <= budget) pool.push(Object.assign({}, item, {catId: id}));
    });
  });
  if (pool.length === 0) {
    document.getElementById('result-box').innerHTML = '<div class="empty">予算内の商品が見つかりませんでした 😢</div>';
    return;
  }
  pool = shuffle(pool);
  var selected = [], remaining = budget;
  for (var i = 0; i < pool.length; i++) {
    if (pool[i].price <= remaining) { selected.push(pool[i]); remaining -= pool[i].price; }
    if (remaining < 80) break;
  }
  var total = selected.reduce(function(s,i){return s+i.price;}, 0);
  var rem = budget - total;
  var rc = rem === 0 ? 'zero' : rem > 0 ? 'ok' : 'over';

  var html = '';
  selected.forEach(function(item, idx) {
    var nutrHtml = '';
    if (item.kcal != null) {
      nutrHtml = '<div class="item-nutrition">'
        + '<span class="nutr-pill nutr-kcal">' + item.kcal + 'kcal</span>'
        + (item.protein != null ? '<span class="nutr-pill nutr-p">P ' + item.protein + 'g</span>' : '')
        + (item.fat     != null ? '<span class="nutr-pill nutr-f">F ' + item.fat     + 'g</span>' : '')
        + (item.carbs   != null ? '<span class="nutr-pill nutr-c">C ' + item.carbs   + 'g</span>' : '')
        + '</div>';
    }
    html += '<div class="result-item" style="animation-delay:' + (idx*0.06) + 's">'
      + '<span class="cat-tag ' + item.catId + '">' + (CAT_LABELS[item.catId]||item.catId) + '</span>'
      + '<div class="item-body">'
      + '<div class="item-name">' + item.name + '</div>'
      + nutrHtml
      + '</div>'
      + '<span class="item-price">¥' + item.price.toLocaleString() + '</span>'
      + '</div>';
  });

  html += '<div class="result-total">'
    + '<div class="total-l">合計<span class="rem ' + rc + '">おつり ¥' + rem.toLocaleString() + '</span></div>'
    + '<div class="total-r">¥' + total.toLocaleString() + '</div>'
    + '</div>';

  var totalKcal    = selected.reduce(function(s,i){return s+(i.kcal    ||0);}, 0);
  var totalProtein = selected.reduce(function(s,i){return s+(i.protein ||0);}, 0);
  var totalFat     = selected.reduce(function(s,i){return s+(i.fat     ||0);}, 0);
  var totalCarbs   = selected.reduce(function(s,i){return s+(i.carbs   ||0);}, 0);

  if (totalKcal > 0) {
    var pCal = totalProtein * 4;
    var fCal = totalFat     * 9;
    var cCal = totalCarbs   * 4;
    var pfcT = pCal + fCal + cCal || 1;
    var pPct = Math.round(pCal/pfcT*100);
    var fPct = Math.round(fCal/pfcT*100);
    var cPct = Math.round(cCal/pfcT*100);

    var bars = [
      {lbl:'P', cls:'p', val:totalProtein.toFixed(1), ref:REF.protein, unit:'g'},
      {lbl:'F', cls:'f', val:totalFat.toFixed(1),     ref:REF.fat,     unit:'g'},
      {lbl:'C', cls:'c', val:totalCarbs.toFixed(1),   ref:REF.carbs,   unit:'g'}
    ];

    html += '<div class="nutr-summary">'
      + '<div class="nutr-summary-title">栄養合計（成人1食あたりの目安との比較）</div>'
      + '<div class="nutr-kcal-total">'
      + '<span class="nutr-kcal-num">' + Math.round(totalKcal) + '</span>'
      + '<span style="font-size:13px;color:var(--muted)">kcal</span>'
      + '<span class="nutr-kcal-ref">/ 目安 ' + REF.kcal + 'kcal</span>'
      + '</div>';

    bars.forEach(function(r) {
      var pct = Math.min(Math.round(parseFloat(r.val)/r.ref*100), 150);
      html += '<div class="nutr-bar-row">'
        + '<span class="nutr-bar-lbl nutr-bar-lbl-' + r.cls + '">' + r.lbl + '</span>'
        + '<div class="nutr-bar-wrap">'
        + '<div class="nutr-bar nutr-bar-' + r.cls + '" style="width:' + Math.min(pct,100) + '%"></div>'
        + '<div class="nutr-bar-ref-line" style="left:66.6%"></div>'
        + '</div>'
        + '<span class="nutr-bar-val">' + r.val + r.unit + '</span>'
        + '<span class="nutr-bar-ref">目安' + r.ref + r.unit + '</span>'
        + '</div>';
    });

    html += '<div class="pfc-section">'
      + makeSvgTriangle(pPct, fPct, cPct)
      + '<div class="pfc-info">'
      + '<div class="pfc-title">PFCバランス</div>'
      + '<div class="pfc-pct">'
      + '<span style="color:#1565c0;font-weight:700">P</span> ' + pPct + '%　'
      + '<span style="color:#c62828;font-weight:700">F</span> ' + fPct + '%　'
      + '<span style="color:#2e7d32;font-weight:700">C</span> ' + cPct + '%'
      + '</div>'
      + '<div class="pfc-ideal">理想目安<br>P 13〜20%<br>F 20〜30%<br>C 50〜65%</div>'
      + '<div class="pfc-note">※成人1食あたり基準</div>'
      + '</div></div>'
      + '</div>';
  }

  document.getElementById('result-box').innerHTML = html;
}

loadData();
</script>
</body>
</html>
